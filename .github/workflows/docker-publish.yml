name: Docker – Build and Publish to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect strongSwan version
        id: strongswan
        run: |
          set -euo pipefail

          base_image="$(awk '/^FROM / { print $2; exit }' Dockerfile)"
          version="$(docker run --rm "$base_image" sh -lc "apt-get update >/dev/null && apt-cache policy strongswan | awk '/Candidate:/ { print \\$2; exit }' | sed -E 's/^[0-9]+://; s/[-+~].*$//'")"

          echo "Detected strongSwan version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Extract metadata (tags, labels) for the Docker image.
      # - published image → ghcr.io/<owner>/<repo>:latest and :<strongswan-version>
      # - v1.2.3 tag      → ghcr.io/<owner>/<repo>:1.2.3 and :1.2
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.strongswan.outputs.version }},enable=${{ github.event_name != 'pull_request' && steps.strongswan.outputs.version != '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the GitHub Actions token – no extra secrets required.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
