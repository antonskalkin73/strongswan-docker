name: Docker – Build and Publish to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUBLISH_IMAGE: ${{ github.event_name != 'pull_request' }}
  PUBLISH_RELEASE_TAGS: ${{ github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect strongSwan version
        id: strongswan
        run: |
          set -euo pipefail

          base_image="$(awk '/^FROM / { print $2; exit }' Dockerfile)"
          package_version="$(
            docker run --rm "$base_image" sh -lc '
              set -e
              apt-get update >/dev/null
              apt-cache policy strongswan |
                awk "/Candidate:/ { print \$2; exit }"
            '
          )"

          if [ -z "$package_version" ]; then
            echo "::error::Failed to detect strongSwan package version from $base_image"
            exit 1
          fi

          # Convert Debian package version to a Docker-tag-safe upstream version.
          # Example: 1:5.9.13-2ubuntu4.24.04.1 -> 5.9.13
          version="$(printf '%s\n' "$package_version" | sed -E 's/^[0-9]+://; s/[-+~].*$//')"

          if [ -z "$version" ]; then
            echo "::error::Failed to normalize strongSwan package version: $package_version"
            exit 1
          fi

          echo "Detected strongSwan version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Extract metadata (tags, labels) for the Docker image.
      # - published image → ghcr.io/<owner>/<repo>:latest and :<strongswan-version>
      # - v1.2.3 tag      → ghcr.io/<owner>/<repo>:1.2.3 and :1.2
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ env.PUBLISH_RELEASE_TAGS == 'true' }}
            type=raw,value=${{ steps.strongswan.outputs.version }},enable=${{ env.PUBLISH_RELEASE_TAGS == 'true' && steps.strongswan.outputs.version != '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the GitHub Actions token – no extra secrets required.
      - name: Log in to GHCR
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUBLISH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
