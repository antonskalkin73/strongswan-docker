name: Docker – Build and Publish to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUBLISH_IMAGE: ${{ github.event_name != 'pull_request' }}
  PUBLISH_RELEASE_TAGS: ${{ github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest strongSwan release
        id: strongswan
        run: |
          set -euo pipefail

          release_json="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/strongswan/strongswan/releases/latest
          )"
          version="$(printf '%s' "$release_json" | jq -r '.tag_name | sub("^v"; "")')"
          tarball_name="strongswan-${version}.tar.gz"
          tarball_url="$(
            printf '%s' "$release_json" |
              jq -r --arg name "$tarball_name" '.assets[] | select(.name == $name) | .browser_download_url'
          )"

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::Failed to detect latest strongSwan release version from GitHub API response"
            exit 1
          fi

          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}$'; then
            echo "::error::Unexpected strongSwan release tag format: $version"
            exit 1
          fi

          if [ -z "$tarball_url" ] || [ "$tarball_url" = "null" ]; then
            echo "::error::Failed to find release asset $tarball_name"
            exit 1
          fi

          curl -fsSL -o strongswan.tar.gz "$tarball_url"

          echo "Detected strongSwan version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Extract metadata (tags, labels) for the Docker image.
      # - published image → ghcr.io/<owner>/<repo>:latest and :<strongswan-version>
      # - v1.2.3 tag      → ghcr.io/<owner>/<repo>:1.2.3 and :1.2
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ env.PUBLISH_RELEASE_TAGS == 'true' }}
            type=raw,value=${{ steps.strongswan.outputs.version }},enable=${{ env.PUBLISH_RELEASE_TAGS == 'true' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the GitHub Actions token – no extra secrets required.
      - name: Log in to GHCR
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUBLISH_IMAGE == 'true' }}
          build-args: |
            STRONGSWAN_VERSION=${{ steps.strongswan.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
