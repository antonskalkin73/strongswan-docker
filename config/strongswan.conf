# strongswan.conf – charon daemon configuration
#
# This file is mounted read-only into the container at /etc/strongswan.conf.

charon {
    # Number of worker threads.
    threads = 16

    # Enable sending of strongSwan vendor ID.
    send_vendor_id = yes

    # Log to stdout so Docker captures output via `docker logs`.
    filelog {
        stdout {
            default = 1
            time_format = %Y-%m-%d %H:%M:%S
            ike_name = yes
            append = no
            flush_line = yes
        }
    }

    # Disable syslog to avoid duplicate output inside the container.
    syslog {
        daemon {
            default = -1
        }
        auth {
            default = -1
        }
    }

    plugins {
        # EAP-MSCHAPv2 for username/password authentication.
        eap-mschapv2 {
            load = yes
        }
    }
}
