# IKEv2 roadwarrior VPN – example ipsec.conf
#
# Replace every occurrence of VPN_FQDN with your server's actual FQDN or IP
# address before deploying.  strongSwan reads this file directly, so
# environment-variable substitution is NOT supported here.
# Example: leftid=@vpn.example.com
#
# This file is mounted read-only into the container at /etc/ipsec.conf.

config setup
    # Send debug output to syslog; set to 3 for verbose troubleshooting.
    charondebug="ike 1, knl 1, cfg 1"
    uniqueids=never

# Default connection settings shared by all connections below.
conn %default
    ikelifetime=60m
    keylife=20m
    rekeymargin=3m
    keyingtries=1
    keyexchange=ikev2
    authby=pubkey

# Roadwarrior connection – accepts remote-access clients using EAP-MSCHAPv2.
conn roadwarrior
    left=%any
    leftid=@VPN_FQDN
    leftcert=server-cert.pem
    leftsendcert=always
    leftsubnet=0.0.0.0/0

    right=%any
    rightid=%any
    rightauth=eap-mschapv2
    rightsourceip=10.10.10.0/24
    rightdns=1.1.1.1,8.8.8.8

    eap_identity=%identity
    auto=add
